<!DOCTYPE html>
<html lang="en-NZ">
<head>
    <meta charset="utf-8">
    <title>Admin Login</title>

    <link rel="icon" href="/static/favicon.webp">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>Hi Oscar!</h1>

    <form action="/admin" method="post">

        <input
            type="password"
            name="password"
            placeholder="Password"
            required

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
