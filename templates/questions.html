<!DOCTYPE html>
<html lang="en-NZ">
<head>
    <meta charset="utf-8">

    <title>Recent Questions</title>

    <link rel="icon" href="/static/favicon.webp">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>Recent Questions</h1>

    {% for row in questions %}

        <details>

            <summary>
                {{ row[0] }}
            </summary>

            <p>
                <strong>Question:</strong><br>
                {{ row[1] }}
            </p>

            <p>
                <strong>Answer:</strong><br>
                {{ row[2] }}
            </p>

        </details>

    {% endfor %}

</div>

</body>
</html>
